<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>彩票摇号模拟器</title>
    <link rel="stylesheet" href="lottery.css">
</head>

<body>
    <div class="container">
        <h1>彩票摇号模拟器</h1>

        <div class="controls">
            <select id="gameType">
                <option value="3d">3D/排列3</option>
                <option value="5d">排列5</option>
                <option value="k8">快乐8</option>
                <option value="lotto">大乐透</option>
                <option value="double-color-ball">双色球</option>
                <option value="qixingcai">七星彩</option>
                <option value="qilecai">七乐彩</option>
            </select>
            <button id="rollBtn">摇一摇</button>
            <select class="hidden" id="ballCount">
                <option value="" disabled selected>请选择</option>
                <option value="20">20个号码开奖</option>
                <option value="1">选1个号码</option>
                <option value="2">选2个号码</option>
                <option value="3">选3个号码</option>
                <option value="4">选4个号码</option>
                <option value="5">选5个号码</option>
                <option value="6">选6个号码</option>
                <option value="7">选7个号码</option>
                <option value="8">选8个号码</option>
                <option value="9">选9个号码</option>
                <option value="10">选10个号码</option>
            </select>
        </div>

        <div id="result" class="result-area"></div>

    </div>

    <div id="toast" class="toast">请等待本次摇号结束</div>

    <div id="confirmOverlay" class="confirm-overlay hidden">
        <div class="confirm-dialog">
            <p id="confirmMessage">确认执行此操作吗？</p>
            <div class="confirm-buttons">
                <button id="confirmCancel" class="btn-cancel">取消</button>
                <button id="confirmOk" class="btn-ok">确定</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
