<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>彩票模拟器</title>


<style>


*{
    box-sizing:border-box;
}


body{

    margin:30px 0;

    text-align:center;

    font-family:Arial;

    background:#f5f5f5;

}


h1{

    font-size:36px;

}



select{

    font-size:20px;

    padding:8px;

}



button{

    margin-top:30px;

    padding:12px 40px;

    font-size:22px;

}




/* 总容器 */

#result{

    margin-top:40px;

}




.row{


    display:flex;


    justify-content:center;


    align-items:center;


    flex-wrap:nowrap;


}




.ball{


    width:58px;


    height:58px;


    margin:5px;


    border-radius:50%;


    display:flex;


    justify-content:center;


    align-items:center;


    color:white;


    font-weight:bold;


    font-size:22px;


}



.red{

    background:#e74c3c;

}



.blue{

    background:#3498db;

}



.green{

    background:#27ae60;

}



/* 快乐8专用 */

.k8-container{


    width:100%;


    display:flex;


    flex-direction:column;


    justify-content:center;


    align-items:center;


}



.k8-row{


    display:flex;


    justify-content:center;


    align-items:center;


}





@media(max-width:600px){



h1{

    font-size:28px;

}



.ball{


    width:38px;


    height:38px;


    margin:3px;


    font-size:15px;


}



select{

    font-size:16px;

}



button{

    font-size:18px;

}



}



</style>


</head>


<body>


<h1>
彩票模拟器
</h1>



<select id="type">


<option value="dlt">
大乐透
</option>


<option value="3d">
3D
</option>


<option value="k8">
快乐8
</option>


<option value="qxc">
七星彩
</option>


</select>


<div id="result"></div>


<button onclick="start()">
开始摇号
</button>




<script>


let timer;



// 不重复号码

function randomNo(max,count){


    let arr=[];


    while(arr.length<count){


        let num=Math.floor(Math.random()*max)+1;


        if(!arr.includes(num)){


            arr.push(num);

        }


    }


    arr.sort((a,b)=>a-b);


    return arr;

}




//3D

function create3D(){


    return [

        Math.floor(Math.random()*10),

        Math.floor(Math.random()*10),

        Math.floor(Math.random()*10)

    ];


}




//七星彩

function createQXC(){


    let arr=[];


    for(let i=0;i<6;i++){


        arr.push(
            Math.floor(Math.random()*10)
        );


    }



    arr.push(
        Math.floor(Math.random()*15)
    );


    return arr;

}




function createLottery(){


    let type=document.getElementById("type").value;




    if(type==="dlt"){


        return {


            nums:[

                ...randomNo(35,5),

                ...randomNo(12,2)

            ],


            colors:[

                "red",

                "red",

                "red",

                "red",

                "red",

                "blue",

                "blue"

            ]

        };

    }





    if(type==="3d"){


        return {


            nums:create3D(),


            colors:[

                "red",

                "red",

                "red"

            ]


        };


    }





    if(type==="k8"){


        return {


            nums:randomNo(80,20),


            colors:Array(20).fill("red")


        };


    }




    if(type==="qxc"){


        return {


            nums:createQXC(),


            colors:[

                "red",

                "red",

                "red",

                "red",

                "red",

                "red",

                "green"

            ]


        };


    }



}







function createBall(num,color,type){


    let ball=document.createElement("div");


    ball.className="ball "+color;



    if(type==="dlt" || type==="k8"){


        ball.innerHTML=
        num.toString().padStart(2,"0");


    }
    else{


        ball.innerHTML=num;


    }



    return ball;


}





function show(data){


    let box=document.getElementById("result");


    box.innerHTML="";



    let type=document.getElementById("type").value;



    //快乐8特殊处理

    if(type==="k8"){


        let container=document.createElement("div");


        container.className="k8-container";



        for(let i=0;i<2;i++){


            let row=document.createElement("div");


            row.className="k8-row";



            for(let j=0;j<10;j++){


                let index=i*10+j;


                row.appendChild(

                    createBall(

                        data.nums[index],

                        "red",

                        type

                    )

                );


            }


            container.appendChild(row);


        }



        box.appendChild(container);


        return;


    }






    //其他全部一排

    let row=document.createElement("div");


    row.className="row";



    data.nums.forEach((num,index)=>{


        row.appendChild(

            createBall(

                num,

                data.colors[index],

                type

            )

        );


    });



    box.appendChild(row);


}






function start(){


    clearInterval(timer);



    timer=setInterval(()=>{


        show(createLottery());


    },100);





    setTimeout(()=>{


        clearInterval(timer);


        show(createLottery());


    },3000);


}



</script>


</body>

</html>
