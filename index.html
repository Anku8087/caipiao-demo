<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>大乐透模拟选号</title>

    <style>

        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        .number {
            font-size: 30px;
            margin: 20px;
        }

        .front {
            color: red;
        }

        .back {
            color: blue;
        }

        button {
            font-size: 25px;
            padding: 10px 30px;
            cursor: pointer;
        }

    </style>

</head>


<body>

<h1>大乐透模拟选号</h1>


<div class="number front">
    前区：
    <span id="front">-- -- -- -- --</span>
</div>


<div class="number back">
    后区：
    <span id="back">-- --</span>
</div>


<button onclick="start()">开始摇号</button>


<script>


function createNumber(max, count) {

    let arr = [];


    while(arr.length < count) {

        let num = Math.floor(Math.random() * max) + 1;


        if(!arr.includes(num)) {

            arr.push(num);

        }

    }


    arr.sort((a,b)=>a-b);


    return arr;

}



function start(){


    let timer = setInterval(()=>{


        let front = createNumber(35,5);
        let back = createNumber(12,2);


        document.getElementById("front").innerHTML =
            front.join(" ");


        document.getElementById("back").innerHTML =
            back.join(" ");


    },100);



    setTimeout(()=>{


        clearInterval(timer);


        let front = createNumber(35,5);
        let back = createNumber(12,2);



        document.getElementById("front").innerHTML =
            front.join(" ");



        document.getElementById("back").innerHTML =
            back.join(" ");



    },3000);


}


</script>


</body>
</html>
